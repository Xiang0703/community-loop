function sw(tab){ctb=tab;document.querySelectorAll('.ti').forEach(e=>e.classList.remove('ac'));document.querySelector('.ti[data-pg="'+tab+'"]').classList.add('ac');document.querySelectorAll('.pg').forEach(p=>p.classList.remove('ac'));document.getElementById('pg-'+tab).classList.add('ac');document.getElementById('nvb').style.display='none';document.getElementById('nvt').textContent={h:'阳光花园·朝阳区',m:'消息中心',p:'我的'}[tab]||'邻里事';if(tab==='m')rm();if(tab==='p')rp();ctid=null}
function gb(){document.getElementById('nvb').style.display='none';document.getElementById('nvt').textContent='阳光花园·朝阳区';document.querySelectorAll('.pg').forEach(p=>p.classList.remove('ac'));document.getElementById('pg-h').classList.add('ac');ctid=null}
function fl(idx,cid){rc(idx);if(cid===0){rt(T);return}rt(T.filter(t=>t.ci===cid))}
function os(){document.getElementById('so').classList.add('sh');document.getElementById('cg').innerHTML=C.map(c=>'<div class="ct" id="ct-'+c.id+'" style="background:'+c.bg+'" onclick="slc('+c.id+')"><span class="ic">'+c.ic+'</span>'+c.n+'</div>').join('');sc=0;document.getElementById('di').value='';document.getElementById('li').value='';document.getElementById('chc').textContent='0/500';document.getElementById('aip').style.display='none';document.getElementById('sb2').disabled=true}
function cs2(e){if(e&&e.target!==document.getElementById('so'))return;document.getElementById('so').classList.remove('sh')}
function slc(id){sc=id;document.querySelectorAll('.ct').forEach(b=>b.classList.remove('se'));document.getElementById('ct-'+id).classList.add('se');sa()}
function ucc(){const l=document.getElementById('di').value.length;document.getElementById('chc').textContent=l+'/500';document.getElementById('sb2').disabled=l<10;if(l>=10)sa()}
function sa(){const d=document.getElementById('di').value;if(d.length<5)return;const c=C.find(c=>c.id===sc);document.getElementById('aip').style.display='block';document.getElementById('air').textContent=c?'分类：'+c.n+' · 优先级：普通 · 标签：'+c.n:'分类：其他 · 优先级：普通'}
function st(){const d=document.getElementById('di').value,l=document.getElementById('li').value;if(d.length<10)return;const c=C.find(c=>c.id===sc)||C[6];const nt={id:T.length+1,ci:c.id,cat:{n:c.n,ic:c.ic},aic:c.n,tl:d.slice(0,50),ds:d,lc:l,st:'open',cc:0,ca:new Date().toISOString(),u:{nn:'小王',av:'',bd:'3号楼',rm:'502'}};T.unshift(nt);LG[nt.id]=[{a:'created',r:'',ca:'刚刚'}];CM[nt.id]=[];cs2();rt(T);sw('h')}
function rvt(id){const t=T.find(t=>t.id===id);if(t)t.st='resolved';if(LG[id])LG[id].push({a:'resolved',r:'',ca:'刚刚'});od(id);rt(T);rp()}
function mar(){NF.forEach(n=>n.ir=1);rm()}
rc();rt(T);rm();rp();
</script></body></html>
